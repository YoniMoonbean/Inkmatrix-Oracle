<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inkmatrix Oracle</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #121212;
            color: #e0e0e0;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            display: inline-block;
            max-width: 600px;
            width: 100%;
            border: 1px solid #333;
        }
        h1 {
            color: #ffb703;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #888;
            margin-bottom: 30px;
        }
        .category-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .category-slot {
            background: #252525;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
            min-width: 150px;
        }
        .category-slot select {
            background: #1e1e1e;
            color: #e0e0e0;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 4px;
            width: 100%;
        }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #252525;
            padding: 12px 20px;
            margin: 12px 0;
            border-radius: 8px;
            border-left: 4px solid #ffb703;
            text-align: left;
        }
        .label {
            font-weight: bold;
            color: #aaa;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100px;
        }
        .value {
            font-size: 18px;
            color: #fff;
            flex-grow: 1;
            padding-left: 10px;
        }
        .reroll-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 5px;
            transition: transform 0.2s;
        }
        .reroll-btn:hover {
            transform: rotate(180deg);
        }
        .main-btn {
            background-color: #ffb703;
            color: #121212;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 25px;
            width: 100%;
            transition: background 0.2s;
        }
        .main-btn:hover {
            background-color: #fb8500;
        }
        .save-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: background 0.2s;
        }
        .save-btn:hover {
            background-color: #45a049;
        }
        .favorites-section {
            margin-top: 40px;
            text-align: left;
        }
        .favorites-title {
            color: #ffb703;
            font-size: 20px;
            margin-bottom: 15px;
            text-align: center;
        }
        .favorite-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #252525;
            padding: 12px 20px;
            margin: 8px 0;
            border-radius: 8px;
            border-left: 4px solid #ffb703;
        }
        .favorite-item span {
            flex-grow: 1;
            font-size: 16px;
        }
        .favorite-btn {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 16px;
            padding: 0 8px;
            transition: color 0.2s;
        }
        .favorite-btn:hover {
            color: #ffb703;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Inkmatrix Oracle 🎨</h1>
    <p class="subtitle">Randomize all at once or lock in your favorites!</p>

    <!-- Category Selector -->
    <div class="category-selector">
        <div class="category-slot">
            <select id="category1" onchange="updateCategory(1)">
                <option value="none">-- Select --</option>
                <option value="characters">Character</option>
                <option value="environments">Environment</option>
                <option value="artstyles">Art Style</option>
            </select>
        </div>
        <div class="category-slot">
            <select id="category2" onchange="updateCategory(2)">
                <option value="none">-- Select --</option>
                <option value="characters">Character</option>
                <option value="environments">Environment</option>
                <option value="artstyles">Art Style</option>
            </select>
        </div>
        <div class="category-slot">
            <select id="category3" onchange="updateCategory(3)">
                <option value="none">-- Select --</option>
                <option value="characters">Character</option>
                <option value="environments">Environment</option>
                <option value="artstyles">Art Style</option>
            </select>
        </div>
    </div>

    <!-- Dynamic Rows for Selected Categories -->
    <div id="category-rows"></div>

    <!-- Buttons -->
    <button class="save-btn" onclick="saveToFavorites()">Save to Favorites</button>
    <button class="main-btn" onclick="generateAll()">Randomize All</button>

    <!-- Favorites Section -->
    <div class="favorites-section">
        <div class="favorites-title">⭐ Favorites ⭐</div>
        <div id="favorites-list"></div>
    </div>
</div>

<!-- Import category scripts -->
<script src="scripts/characters.js"></script>
<script src="scripts/environments.js"></script>
<script src="scripts/artstyles.js"></script>

<script>
// Combine all category arrays into promptData
const promptData = {
  characters: characters,
  environments: environments,
  artstyles: artstyles
};

// Track selected categories and their display elements
let selectedCategories = [null, null, null];
let categoryElements = [];

// Helper function to get a random element from an array
function getRandomElement(array) {
    const randomIndex = Math.floor(Math.random() * array.length);
    return array[randomIndex];
}

// Update the category rows based on dropdown selections
function updateCategory(slot) {
    const selectElement = document.getElementById(`category${slot}`);
    const categoryKey = selectElement.value;
    selectedCategories[slot - 1] = categoryKey;
    renderCategoryRows();
}

// Render the rows for selected categories
function renderCategoryRows() {
    const container = document.getElementById("category-rows");
    container.innerHTML = "";
    categoryElements = [];

    selectedCategories.forEach((categoryKey, index) => {
        if (categoryKey && categoryKey !== "none") {
            const rowId = `row-${index + 1}`;
            const valueId = `value-${index + 1}`;

            const row = document.createElement("div");
            row.className = "row";
            row.id = rowId;
            row.innerHTML = `
                <div>
                    <div class="label">${categoryKey.charAt(0).toUpperCase() + categoryKey.slice(1)}</div>
                    <div class="value" id="${valueId}">-</div>
                </div>
                <button class="reroll-btn" onclick="generateSingle('${categoryKey}', '${valueId}')" title="Randomize only this category">🔄</button>
            `;
            container.appendChild(row);
            categoryElements.push({ key: categoryKey, valueId: valueId });
        }
    });

    // Randomize all if at least one category is selected
    if (categoryElements.length > 0) {
        generateAll();
    }
}

// Function to randomize a single category
function generateSingle(dataKey, elementId) {
    const randomValue = getRandomElement(promptData[dataKey]);
    document.getElementById(elementId).innerText = randomValue;
}

// Function to randomize all selected categories
function generateAll() {
    categoryElements.forEach(({ key, valueId }) => {
        generateSingle(key, valueId);
    });
}

// Save current prompts to favorites
function saveToFavorites() {
    const currentPrompts = categoryElements.map(({ key, valueId }) => ({
        category: key,
        value: document.getElementById(valueId).innerText
    }));

    if (currentPrompts.length === 0) {
        alert("Please select at least one category!");
        return;
    }

    let favorites = JSON.parse(localStorage.getItem('inkmatrixFavorites')) || [];
    favorites.push(currentPrompts);
    localStorage.setItem('inkmatrixFavorites', JSON.stringify(favorites));
    renderFavorites();
}

// Render the favorites list
function renderFavorites() {
    const favorites = JSON.parse(localStorage.getItem('inkmatrixFavorites')) || [];
    const container = document.getElementById('favorites-list');

    if (favorites.length === 0) {
        container.innerHTML = "<p style='text-align: center; color: #888;'>No favorites yet. Save some combinations!</p>";
        return;
    }

    container.innerHTML = favorites.map((combo, index) => `
        <div class="favorite-item">
            <span>${combo.map(c => `${c.category}: ${c.value}`).join(', ')}</span>
            <button class="favorite-btn" onclick="moveFavoriteUp(${index})">↑</button>
            <button class="favorite-btn" onclick="moveFavoriteDown(${index})">↓</button>
            <button class="favorite-btn" onclick="deleteFavorite(${index})">🗑</button>
        </div>
    `).join('');
}

// Move a favorite up in the list
function moveFavoriteUp(index) {
    let favorites = JSON.parse(localStorage.getItem('inkmatrixFavorites')) || [];
    if (index > 0) {
        [favorites[index], favorites[index - 1]] = [favorites[index - 1], favorites[index]];
        localStorage.setItem('inkmatrixFavorites', JSON.stringify(favorites));
        renderFavorites();
    }
}

// Move a favorite down in the list
function moveFavoriteDown(index) {
    let favorites = JSON.parse(localStorage.getItem('inkmatrixFavorites')) || [];
    if (index < favorites.length - 1) {
        [favorites[index], favorites[index + 1]] = [favorites[index + 1], favorites[index]];
        localStorage.setItem('inkmatrixFavorites', JSON.stringify(favorites));
        renderFavorites();
    }
}

// Delete a favorite
function deleteFavorite(index) {
    let favorites = JSON.parse(localStorage.getItem('inkmatrixFavorites')) || [];
    favorites.splice(index, 1);
    localStorage.setItem('inkmatrixFavorites', JSON.stringify(favorites));
    renderFavorites();
}

// Initialize the page
window.onload = function() {
    renderCategoryRows();
    renderFavorites();
};
</script>

</body>
</html>
